#cloud-config
package_update: true
package_upgrade: true
packages:
  - squid
  - ca-certificates
  - curl

write_files:
  - path: /etc/squid/whitelist.txt
    permissions: '0644'
    owner: 'root:root'
    content: |
      # Claude AI
      .claude.ai
      .claude.com
      .anthropic.com
      # GitHub
      .github.com
      .githubusercontent.com
      # npm
      .npmjs.org
      .npmjs.com
      # Ubuntu / Debian パッケージ
      .ubuntu.com
      .debian.org
      .launchpad.net
      archive.ubuntu.com
      security.ubuntu.com
      # Microsoft (Entra ID SSH拡張, Azure extensions)
      .microsoft.com
      .azure.com
      .windows.net
      login.microsoftonline.com
      # Node.js
      .nodejs.org
      .nodesource.com
      deb.nodesource.com
      # GitHub CLI
      cli.github.com

  - path: /etc/squid/squid.conf
    permissions: '0644'
    owner: 'root:root'
    content: |
      # ACL: ローカルネットワーク（開発VMサブネット）
      acl localnet src 192.168.95.0/26

      # ACL: ポート
      acl SSL_ports port 443
      acl Safe_ports port 80
      acl Safe_ports port 443
      acl CONNECT method CONNECT

      # ACL: ホワイトリスト
      acl whitelist dstdomain "/etc/squid/whitelist.txt"

      # ルール
      http_access deny !Safe_ports
      http_access deny CONNECT !SSL_ports
      http_access allow localnet whitelist
      http_access deny all

      # ポート
      http_port 3128

      # ログ
      access_log /var/log/squid/access.log
      cache_log /var/log/squid/cache.log

      # キャッシュ
      cache_dir ufs /var/spool/squid 512 16 256
      coredump_dir /var/spool/squid

runcmd:
  - systemctl enable squid
  - systemctl restart squid
